<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>Hotel San Carlos POS</title>

    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        const errorInfo = `
          ERROR FATAL CAPTURADO:
          ---------------------------------
          Mensaje: ${message}
          Fuente: ${source}
          Línea: ${lineno}
          Columna: ${colno}
          Stack Trace: ${error ? error.stack : 'No disponible'}
        `;
        // Muestra el error en una alerta que no se puede ignorar
        alert(errorInfo);
        return true; // Previene que el error siga propagándose
      };
    </script>
    </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
